name: Build, Release, and Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build And Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Pages Site
        run: |
          mkdir -p public/dist
          cp demo.html public/index.html
          cp dist/inventory-graph.min.js public/dist/inventory-graph.min.js

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            demo.html
            dist/inventory-graph.min.js
          if-no-files-found: error

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Publish Release Assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Set Release Metadata
        id: release-meta
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            echo "tag_name=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "release_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=build-$RUN_NUMBER" >> "$GITHUB_OUTPUT"
            echo "release_name=Build $RUN_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release-meta.outputs.release_name }}
          body: Built inventory graph assets.
          fail_on_unmatched_files: true
          files: |
            release-assets/demo.html
            release-assets/dist/inventory-graph.min.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
